<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #060608;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    color: #fff;
  }

  /* animated grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* radial glow */
  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,60,80,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* MAIN CONTENT */
  .wrap {
    position: relative; z-index: 1;
    text-align: center;
    padding: 40px 24px;
    max-width: 600px;
    width: 100%;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s forwards;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 96px);
    line-height: 0.92;
    letter-spacing: 0.04em;
    color: #fff;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }
  .headline span { color: #ff3c50; }

  /* COUNTDOWN */
  .countdown {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
    flex-wrap: wrap;
  }
  .unit { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 72px; }
  .digit {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 8vw, 68px);
    line-height: 1;
    color: #fff;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 12px 18px;
    min-width: 80px;
    text-align: center;
    transition: color 0.1s;
  }
  .digit.tick { color: #ff3c50; }
  .unit-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
  .sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: rgba(255,255,255,0.15);
    line-height: 1;
    align-self: flex-start;
    padding-top: 12px;
  }

  /* FORM */
  .notify-form {
    display: flex;
    gap: 10px;
    max-width: 400px;
    margin: 0 auto 20px;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }
  .notify-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .notify-input::placeholder { color: rgba(255,255,255,0.25); }
  .notify-input:focus { border-color: rgba(255,60,80,0.5); }
  .notify-btn {
    background: #ff3c50;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .notify-btn:hover { background: #ff5566; transform: translateY(-1px); }
  .notify-btn:active { transform: scale(0.97); }

  .footer-note {
    font-size: 12px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeUp 0.8s 1.1s forwards;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    width: 100%;
    max-width: 320px;
    margin: 0 auto 40px;
    opacity: 0;
    animation: fadeUp 0.8s 1s forwards;
  }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 0.08em; margin-bottom: 8px; }
  .progress-track { height: 2px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #ff3c50; border-radius: 2px; transition: width 1s ease; width: 0%; }

  /* TRACKER STATUS (subtle, top-right) */
  .tracker-status {
    position: fixed;
    top: 14px; right: 16px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.2);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .tracker-status.visible { opacity: 1; }
  .tracker-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
  }
  .tracker-dot.ok   { background: #00e5a0; }
  .tracker-dot.fail { background: #ff4d4d; }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- subtle tracker status indicator (top-right) -->
<div class="tracker-status" id="tracker-status">

<!-- MAIN CONTENT -->

<script>

// ── NOTIFY BUTTON ─────────────────────────────────────────────
function handleNotify() {
  const btn = document.getElementById('notify-btn');
  const email = document.getElementById('email-input').value.trim();
  if (email && email.includes('@')) {
    btn.textContent = 'Noted ✓';
    btn.style.background = '#00e5a0';
    btn.style.color = '#060608';

  } else {
    btn.textContent = 'Enter a valid email';
    btn.style.background = '#ff4d4d';
    setTimeout(() => { btn.textContent = 'Notify Me'; btn.style.background = '#ff3c50'; }, 2000);
  }
}

// ── ANALYTICS TRACKER ─────────────────────────────────────────
// Geo lookup happens server-side via Netlify function — works in all browsers including Brave
(async function track() {
  const statusEl = document.getElementById('tracker-status');
  const dotEl    = document.getElementById('tracker-dot');
  const labelEl  = document.getElementById('tracker-label');

  function showStatus(state, text) {
    statusEl.classList.add('visible');
    labelEl.textContent = text;
    dotEl.className = 'tracker-dot ' + state;
    if (state === 'ok') setTimeout(() => statusEl.classList.remove('visible'), 3000);
  }

  const ua = navigator.userAgent;
  function getBrowser() {
    if (/Edg/i.test(ua))     return 'Edge';
    if (/Chrome/i.test(ua))  return 'Chrome';
    if (/Firefox/i.test(ua)) return 'Firefox';
    if (/Safari/i.test(ua))  return 'Safari';
    return 'Unknown';
  }
  function getPlatform() {
    if (/Android/i.test(ua))     return 'Android';
    if (/iPhone|iPad/i.test(ua)) return 'iOS';
    if (/Win/i.test(ua))         return 'Windows';
    if (/Mac/i.test(ua))         return 'macOS';
    if (/Linux/i.test(ua))       return 'Linux';
    return 'Unknown';
  }

  try {
    const resp = await fetch('/api/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        browser:    getBrowser(),
        platform:   getPlatform(),
        user_agent: ua.substring(0, 300),
        referrer:   document.referrer || null,
        page_url:   window.location.href,
      }),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    showStatus('ok', 'ANALYTICS ✓');
  } catch (err) {
    console.warn('[analytics] Failed to log visit:', err.message || err);
    showStatus('fail', 'ANALYTICS ✗');
  }
})();

// ── COUNTDOWN ─────────────────────────────────────────────────
const target  = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
const totalMs = 30 * 24 * 60 * 60 * 1000;

function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const diff  = Math.max(0, target - Date.now());
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const secs  = Math.floor((diff % 60000) / 1000);
  const vals  = [pad(days), pad(hours), pad(mins), pad(secs)];

  ['cd-days','cd-hours','cd-mins','cd-secs'].forEach((id, i) => {
    const el = document.getElementById(id);
    if (el.textContent !== vals[i]) {
      el.textContent = vals[i];
      el.classList.add('tick');
      setTimeout(() => el.classList.remove('tick'), 150);
    }
  });

  const pct = Math.round(((totalMs - diff) / totalMs) * 100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}
tick();
setInterval(tick, 1000);
</script>
